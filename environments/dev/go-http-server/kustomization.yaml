apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../../bases/go-http-server

# Image tag for dev (updated automatically by CI workflow)
images:
  - name: docker.io/idiots718/go-http-server
    newTag: dev-latest

patches:
  - path: patches/deployment-patch.yaml
  - path: patches/ingress-patch.yaml
  - path: patches/hpa-patch.yaml
  - path: patches/resource-patch.yaml
