apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps-project
  namespace: argocd
spec:
  description: Project for all microservices applications
  
  sourceRepos:
  - 'https://github.com/davidsugianto/idp-gitops-manifests.git'
  
  destinations:
  - namespace: 'dev-*'
    server: https://kubernetes.default.svc
  - namespace: 'staging-*'
    server: https://kubernetes.default.svc
  - namespace: 'prod-*'
    server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  
  orphanedResources:
    warn: true