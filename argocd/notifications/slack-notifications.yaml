apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  
  template.sync-succeeded: |
    message: |
      Application {{.app.metadata.name}} sync succeeded.
      Revision: {{.app.status.sync.revision}}
      Environment: {{.app.metadata.labels.environment}}
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "title": "{{.app.metadata.name}} Sync Succeeded",
          "fields": [
            {"title": "Repository", "value": "{{.app.spec.source.repoURL}}", "short": true},
            {"title": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "short": true}
          ]
        }]
  
  template.sync-failed: |
    message: |
      ⚠️ Application {{.app.metadata.name}} sync failed!
      Error: {{.app.status.operationState.message}}
    slack:
      attachments: |
        [{
          "color": "#e53935",
          "title": "{{.app.metadata.name}} Sync Failed",
          "fields": [
            {"title": "Error", "value": "{{.app.status.operationState.message}}"}
          ]
        }]
  
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [sync-succeeded]
  
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [sync-failed]