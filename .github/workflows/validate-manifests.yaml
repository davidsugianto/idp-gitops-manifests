name: Validate K8s Manifests

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Setup kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Kustomize Build Validation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building all Kustomize manifests..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          ERRORS=0
          
          find environments/ -name "kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo ""
            echo "📦 Building: $dir"
            
            if kustomize build "$dir" > /dev/null 2>&1; then
              echo "  ✅ Build successful"
            else
              echo "  ❌ Build failed!"
              kustomize build "$dir" 2>&1 | sed 's/^/    /'
              ERRORS=$((ERRORS + 1))
            fi
          done
          
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS build(s) failed"
            exit 1
          fi
          
          echo ""
          echo "✅ All builds successful!"

      - name: Schema Validation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating Kubernetes schemas..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          ERRORS=0
          
          find environments/ -name "kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo ""
            echo "📦 Validating: $dir"
            
            # Skip CRDs that don't have schemas in kubeconform
            # ExternalSecret, ClusterSecretStore, SecretStore (External Secrets Operator)
            # Application, ApplicationSet, AppProject (ArgoCD)
            if kustomize build "$dir" | kubeconform \
              -strict \
              -kubernetes-version 1.28.0 \
              -skip ExternalSecret \
              -skip ClusterSecretStore \
              -skip SecretStore \
              -skip Application \
              -skip ApplicationSet \
              -skip AppProject 2>&1; then
              echo "  ✅ Schema validation passed"
            else
              echo "  ❌ Schema validation failed!"
              ERRORS=$((ERRORS + 1))
            fi
          done
          
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS validation(s) failed"
            exit 1
          fi
          
          echo ""
          echo "✅ All validations passed!"

      - name: Security Scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environments/
          framework: kubernetes
          soft_fail: true
          skip_check: |
            CKV_K8S_15,
            CKV_K8S_20,
            CKV_K8S_43,
            CKV_K8S_35,
            CKV_K8S_40,
            CKV_K8S_8
          output_format: cli
          output_file_path: console

      - name: Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ VALIDATION COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "All manifests have been validated:"
          echo "  ✅ Kustomize build: Passed"
          echo "  ✅ Schema validation: Passed (with CRD skips)"
          echo "  ✅ Security scan: Completed (soft fail enabled)"
          echo ""
          echo "Skipped CRDs in schema validation:"
          echo "  - ExternalSecret (External Secrets Operator)"
          echo "  - ClusterSecretStore (External Secrets Operator)"
          echo "  - SecretStore (External Secrets Operator)"
          echo "  - Application (ArgoCD)"
          echo "  - ApplicationSet (ArgoCD)"
          echo "  - AppProject (ArgoCD)"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"