name: Validate K8s Manifests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Setup kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Kustomize Build Validation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building all Kustomize manifests..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          find environments/ -name "kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo "Building $dir..."
            if ! kustomize build "$dir" > /dev/null 2>&1; then
              echo "❌ Kustomize build failed for $dir"
              kustomize build "$dir" 2>&1 | sed 's/^/  /'
              exit 1
            fi
            echo "✅ $dir built successfully"
          done

      - name: Schema Validation (with CRD skip)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating Kubernetes schemas..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          find environments/ -name "kustomization.yaml" -exec dirname {} \; | while read dir; do
            echo "Validating $dir..."
            
            # Skip CRDs that don't have schemas in kubeconform
            kustomize build "$dir" | kubeconform \
              -strict \
              -kubernetes-version 1.28.0 \
              -skip ExternalSecret \
              -skip ClusterSecretStore \
              -skip SecretStore \
              -skip Application \
              -skip ApplicationSet \
              -skip AppProject
            
            if [ $? -eq 0 ]; then
              echo "✅ $dir validation passed"
            else
              echo "❌ $dir validation failed"
              exit 1
            fi
          done

      - name: Security Scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environments/
          framework: kubernetes
          soft_fail: true
          skip_check: CKV_K8S_15,CKV_K8S_20,CKV_K8S_43