name: Generate Service Scaffold

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Service name (e.g., go-payment-service)'
        required: true
        type: string
      image-name:
        description: 'Full image name (e.g., ghcr.io/davidsugianto/go-payment-service)'
        required: true
        type: string
      environments:
        description: 'Environments to generate'
        required: true
        type: choice
        options:
          - 'dev,staging,prod'
          - 'dev,staging'
          - 'dev'
          - 'prod'
        default: 'dev,staging,prod'
      create-pr:
        description: 'Create Pull Request (recommended)'
        required: true
        type: boolean
        default: true
      include-ingress:
        description: 'Include Ingress resource'
        required: true
        type: boolean
        default: true
      include-hpa:
        description: 'Include Horizontal Pod Autoscaler'
        required: true
        type: boolean
        default: true
      include-external-secret:
        description: 'Include ExternalSecret resource'
        required: true
        type: boolean
        default: true
      custom-port:
        description: 'Container port (default: 8080)'
        required: false
        type: string
        default: '8080'
      health-check-path:
        description: 'Health check path (default: /health)'
        required: false
        type: string
        default: '/health'
      readiness-check-path:
        description: 'Readiness check path (default: /ready)'
        required: false
        type: string
        default: '/ready'
  
  # Automated trigger from other workflows (optional)
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      environments:
        required: false
        type: string
        default: 'dev,staging,prod'
      create-pr:
        required: false
        type: boolean
        default: true
      include-ingress:
        required: false
        type: boolean
        default: true
      include-hpa:
        required: false
        type: boolean
        default: true
      include-external-secret:
        required: false
        type: boolean
        default: true
      custom-port:
        required: false
        type: string
        default: '8080'
      health-check-path:
        required: false
        type: string
        default: '/health'
      readiness-check-path:
        required: false
        type: string
        default: '/ready'
    secrets:
      git-token:
        required: false

jobs:
  generate-scaffold:
    name: Generate Service Scaffold
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating inputs..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Validate service name (Kubernetes naming rules)
          if [[ ! "${{ inputs.service-name }}" =~ ^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$ ]]; then
            echo "❌ Invalid service name: ${{ inputs.service-name }}"
            echo "Service name must:"
            echo "  - Contain only lowercase alphanumeric characters or '-'"
            echo "  - Start and end with an alphanumeric character"
            echo "  - Be max 63 characters"
            exit 1
          fi
          
          if [ ${#SERVICE_NAME} -gt 63 ]; then
            echo "❌ Service name too long (max 63 characters)"
            exit 1
          fi
          
          # Check if service already exists
          if [ -d "bases/${{ inputs.service-name }}" ]; then
            echo "⚠️  Warning: Service '${{ inputs.service-name }}' already exists in bases/"
            echo "This will overwrite existing files!"
          fi
          
          echo "✅ All inputs validated"
          echo ""
          echo "📋 Configuration:"
          echo "  Service Name: ${{ inputs.service-name }}"
          echo "  Image Name: ${{ inputs.image-name }}"
          echo "  Environments: ${{ inputs.environments }}"
          echo "  Create PR: ${{ inputs.create-pr }}"
          echo "  Include Ingress: ${{ inputs.include-ingress }}"
          echo "  Include HPA: ${{ inputs.include-hpa }}"
          echo "  Include ExternalSecret: ${{ inputs.include-external-secret }}"
          echo "  Container Port: ${{ inputs.custom-port }}"
          echo "  Health Check: ${{ inputs.health-check-path }}"
          echo "  Readiness Check: ${{ inputs.readiness-check-path }}"
          echo ""

      - name: Generate scaffold files
        id: generate
        run: |
          SERVICE_NAME="${{ inputs.service-name }}"
          IMAGE_NAME="${{ inputs.image-name }}"
          PORT="${{ inputs.custom-port }}"
          HEALTH_PATH="${{ inputs.health-check-path }}"
          READINESS_PATH="${{ inputs.readiness-check-path }}"
          ENVIRONMENTS="${{ inputs.environments }}"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Generating scaffold for: $SERVICE_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          # ═══════════════════════════════════════════════════════════════
          # CREATE BASE MANIFESTS
          # ═══════════════════════════════════════════════════════════════
          
          BASE_DIR="bases/${SERVICE_NAME}"
          mkdir -p "${BASE_DIR}"
          
          echo "📦 Creating base manifests..."
          
          # deployment.yaml
          cat > "${BASE_DIR}/deployment.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${SERVICE_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${SERVICE_NAME}
            template:
              metadata:
                labels:
                  app: ${SERVICE_NAME}
              spec:
                containers:
                - name: ${SERVICE_NAME}
                  image: ${IMAGE_NAME}:latest
                  ports:
                  - containerPort: ${PORT}
                    name: http
                  env:
                  - name: PORT
                    value: "${PORT}"
                  - name: ENV
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  livenessProbe:
                    httpGet:
                      path: ${HEALTH_PATH}
                      port: ${PORT}
                    initialDelaySeconds: 10
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: ${READINESS_PATH}
                      port: ${PORT}
                    initialDelaySeconds: 5
                    periodSeconds: 5
          EOF
          
          # service.yaml
          cat > "${BASE_DIR}/service.yaml" <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${SERVICE_NAME}
          spec:
            type: ClusterIP
            selector:
              app: ${SERVICE_NAME}
            ports:
            - port: 80
              targetPort: ${PORT}
              protocol: TCP
              name: http
          EOF
          
          # Build resources list for kustomization.yaml
          RESOURCES="- deployment.yaml
            - service.yaml"
          
          # ingress.yaml (optional)
          if [ "${{ inputs.include-ingress }}" == "true" ]; then
            cat > "${BASE_DIR}/ingress.yaml" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${SERVICE_NAME}
          spec:
            ingressClassName: nginx
            rules:
            - host: ${SERVICE_NAME}.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: ${SERVICE_NAME}
                      port:
                        number: 80
          EOF
            RESOURCES="${RESOURCES}
            - ingress.yaml"
          fi
          
          # hpa.yaml (optional)
          if [ "${{ inputs.include-hpa }}" == "true" ]; then
            cat > "${BASE_DIR}/hpa.yaml" <<EOF
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: ${SERVICE_NAME}
            labels:
              app: ${SERVICE_NAME}
          spec:
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: ${SERVICE_NAME}
            minReplicas: 1
            maxReplicas: 5
            metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80
          EOF
            RESOURCES="${RESOURCES}
            - hpa.yaml"
          fi
          
          # external-secret.yaml (optional)
          if [ "${{ inputs.include-external-secret }}" == "true" ]; then
            cat > "${BASE_DIR}/external-secret.yaml" <<EOF
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: ${SERVICE_NAME}-secrets
            labels:
              app: ${SERVICE_NAME}
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: aws-secret-store
              kind: ClusterSecretStore
            target:
              name: ${SERVICE_NAME}-secrets
              creationPolicy: Owner
            data:
            - secretKey: database-url
              remoteRef:
                key: /dev/${SERVICE_NAME}/database
                property: url
          EOF
            RESOURCES="${RESOURCES}
            - external-secret.yaml"
          fi
          
          # kustomization.yaml
          cat > "${BASE_DIR}/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          
          resources:
          ${RESOURCES}
          
          components:
            - ../../components/security-hardening
            - ../../components/observability
            - ../../components/common-labels
          EOF
          
          echo "✅ Base manifests created in ${BASE_DIR}"
          echo ""
          
          # ═══════════════════════════════════════════════════════════════
          # CREATE ENVIRONMENT OVERLAYS
          # ═══════════════════════════════════════════════════════════════
          
          IFS=',' read -ra ENV_ARRAY <<< "$ENVIRONMENTS"
          
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)  # trim whitespace
            
            ENV_DIR="environments/${ENV}/${SERVICE_NAME}"
            PATCHES_DIR="${ENV_DIR}/patches"
            mkdir -p "${PATCHES_DIR}"
            
            echo "🎨 Creating ${ENV} environment overlay..."
            
            # Determine image tag
            if [ "$ENV" == "dev" ]; then
              IMAGE_TAG="dev-latest"
            elif [ "$ENV" == "staging" ]; then
              IMAGE_TAG="staging-latest"
            else
              IMAGE_TAG="latest"
            fi
            
            # Build patches list
            PATCHES="- path: patches/deployment-patch.yaml
              - path: patches/resource-patch.yaml"
            
            if [ "${{ inputs.include-ingress }}" == "true" ]; then
              PATCHES="${PATCHES}
              - path: patches/ingress-patch.yaml"
            fi
            
            if [ "${{ inputs.include-hpa }}" == "true" ]; then
              PATCHES="${PATCHES}
              - path: patches/hpa-patch.yaml"
            fi
            
            if [ "$ENV" == "prod" ]; then
              # Production: Dedicated namespace with isolation
              cat > "${ENV_DIR}/namespace.yaml" <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: prod-${SERVICE_NAME}
            labels:
              environment: prod
              service: ${SERVICE_NAME}
              tier: backend
          EOF
              
              cat > "${ENV_DIR}/resource-quota.yaml" <<EOF
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: ${SERVICE_NAME}-quota
            namespace: prod-${SERVICE_NAME}
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: 8Gi
              limits.cpu: "8"
              limits.memory: 16Gi
              pods: "20"
          EOF
              
              cat > "${ENV_DIR}/limit-range.yaml" <<EOF
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: ${SERVICE_NAME}-limits
            namespace: prod-${SERVICE_NAME}
          spec:
            limits:
            - default:
                cpu: 500m
                memory: 512Mi
              defaultRequest:
                cpu: 200m
                memory: 256Mi
              type: Container
          EOF
              
              cat > "${ENV_DIR}/network-policy.yaml" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: ${SERVICE_NAME}-netpol
            namespace: prod-${SERVICE_NAME}
          spec:
            podSelector:
              matchLabels:
                app: ${SERVICE_NAME}
            policyTypes:
            - Ingress
            - Egress
            ingress:
            - from:
              - namespaceSelector:
                  matchLabels:
                    environment: prod
            egress:
            - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
              ports:
              - protocol: UDP
                port: 53
          EOF
              
              cat > "${ENV_DIR}/pod-disruption-budget.yaml" <<EOF
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: ${SERVICE_NAME}-pdb
            namespace: prod-${SERVICE_NAME}
          spec:
            minAvailable: 2
            selector:
              matchLabels:
                app: ${SERVICE_NAME}
          EOF
              
              cat > "${ENV_DIR}/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          
          resources:
            - namespace.yaml
            - resource-quota.yaml
            - limit-range.yaml
            - network-policy.yaml
            - pod-disruption-budget.yaml
            - ../../../bases/${SERVICE_NAME}
          
          images:
            - name: ${IMAGE_NAME}
              newTag: ${IMAGE_TAG}
          
          patches:
          ${PATCHES}
          EOF
              
              echo "  ✅ Production: Dedicated namespace (prod-${SERVICE_NAME})"
              
            else
              # Dev/Staging: Shared namespace
              cat > "${ENV_DIR}/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          
          namespace: ${ENV}
          
          resources:
            - ../../../bases/${SERVICE_NAME}
          
          images:
            - name: ${IMAGE_NAME}
              newTag: ${IMAGE_TAG}
          
          patches:
          ${PATCHES}
          EOF
              
              echo "  ✅ ${ENV}: Shared namespace (${ENV})"
            fi
            
            # Create patches
            if [ "$ENV" == "dev" ]; then
              LOG_LEVEL="debug"
              CPU_REQ="50m"
              MEM_REQ="64Mi"
              CPU_LIM="200m"
              MEM_LIM="256Mi"
              MIN_REPLICAS=1
              MAX_REPLICAS=3
            elif [ "$ENV" == "staging" ]; then
              LOG_LEVEL="info"
              CPU_REQ="100m"
              MEM_REQ="128Mi"
              CPU_LIM="500m"
              MEM_LIM="512Mi"
              MIN_REPLICAS=2
              MAX_REPLICAS=5
            else
              LOG_LEVEL="warn"
              CPU_REQ="200m"
              MEM_REQ="256Mi"
              CPU_LIM="1000m"
              MEM_LIM="1Gi"
              MIN_REPLICAS=3
              MAX_REPLICAS=10
            fi
            
            # deployment-patch.yaml
            cat > "${PATCHES_DIR}/deployment-patch.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${SERVICE_NAME}
          spec:
            replicas: 1
            template:
              spec:
                containers:
                - name: ${SERVICE_NAME}
                  env:
                  - name: LOG_LEVEL
                    value: "${LOG_LEVEL}"
          EOF
            
            # resource-patch.yaml
            cat > "${PATCHES_DIR}/resource-patch.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${SERVICE_NAME}
          spec:
            template:
              spec:
                containers:
                - name: ${SERVICE_NAME}
                  resources:
                    requests:
                      cpu: "${CPU_REQ}"
                      memory: "${MEM_REQ}"
                    limits:
                      cpu: "${CPU_LIM}"
                      memory: "${MEM_LIM}"
          EOF
            
            # ingress-patch.yaml (if included)
            if [ "${{ inputs.include-ingress }}" == "true" ]; then
              if [ "$ENV" == "prod" ]; then
                HOST="${SERVICE_NAME}.davidsugianto.com"
              else
                HOST="${ENV}.${SERVICE_NAME}.davidsugianto.com"
              fi
              
              cat > "${PATCHES_DIR}/ingress-patch.yaml" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${SERVICE_NAME}
          spec:
            rules:
            - host: ${HOST}
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: ${SERVICE_NAME}
                      port:
                        number: 80
          EOF
            fi
            
            # hpa-patch.yaml (if included)
            if [ "${{ inputs.include-hpa }}" == "true" ]; then
              cat > "${PATCHES_DIR}/hpa-patch.yaml" <<EOF
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: ${SERVICE_NAME}
          spec:
            minReplicas: ${MIN_REPLICAS}
            maxReplicas: ${MAX_REPLICAS}
          EOF
            fi
            
            echo "  ✅ Patches created for ${ENV}"
          done
          
          echo ""
          echo "✅ All environment overlays created"

      - name: Validate generated manifests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating generated manifests..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
          # Validate each environment
          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            KUSTOMIZE_DIR="environments/${ENV}/${{ inputs.service-name }}"
            
            echo ""
            echo "📦 Validating: $KUSTOMIZE_DIR"
            
            if ! kustomize build "$KUSTOMIZE_DIR" > /dev/null 2>&1; then
              echo "❌ Kustomize build failed for $KUSTOMIZE_DIR"
              kustomize build "$KUSTOMIZE_DIR" 2>&1 | sed 's/^/  /'
              exit 1
            fi
            
            echo "✅ Kustomize build successful"
          done
          
          echo ""
          echo "✅ All validations passed!"

      - name: Configure Git
        if: inputs.create-pr == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        if: inputs.create-pr == true
        run: |
          BRANCH_NAME="scaffold/${{ inputs.service-name }}"
          
          git checkout -b "$BRANCH_NAME"
          
          git add bases/${{ inputs.service-name }}
          git add environments/
          
          git commit -m "feat: add ${{ inputs.service-name }} scaffold
          
          - Service: ${{ inputs.service-name }}
          - Image: ${{ inputs.image-name }}
          - Environments: ${{ inputs.environments }}
          - Generated by: ${{ github.actor }}
          - Workflow: ${{ github.workflow }}"
          
          git push origin "$BRANCH_NAME"
          
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        if: inputs.create-pr == true
        run: |
          PR_TITLE="🆕 Add ${{ inputs.service-name }} scaffold"
          PR_BODY="## New Service Scaffold
          
          ### Service Details
          - **Name:** \`${{ inputs.service-name }}\`
          - **Image:** \`${{ inputs.image-name }}\`
          - **Environments:** ${{ inputs.environments }}
          - **Container Port:** ${{ inputs.custom-port }}
          
          ### Generated Files
          
          #### Base Manifests
          - \`bases/${{ inputs.service-name }}/deployment.yaml\`
          - \`bases/${{ inputs.service-name }}/service.yaml\`
          $([ "${{ inputs.include-ingress }}" == "true" ] && echo "- \`bases/${{ inputs.service-name }}/ingress.yaml\`")
          $([ "${{ inputs.include-hpa }}" == "true" ] && echo "- \`bases/${{ inputs.service-name }}/hpa.yaml\`")
          $([ "${{ inputs.include-external-secret }}" == "true" ] && echo "- \`bases/${{ inputs.service-name }}/external-secret.yaml\`")
          - \`bases/${{ inputs.service-name }}/kustomization.yaml\`
          
          #### Environment Overlays
          $(IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            if [ "$ENV" == "prod" ]; then
              echo "- \`environments/prod/${{ inputs.service-name }}/\` (dedicated namespace: prod-${{ inputs.service-name }})"
            else
              echo "- \`environments/${ENV}/${{ inputs.service-name }}/\` (shared namespace: ${ENV})"
            fi
          done)
          
          ### Next Steps
          - [ ] Review generated manifests
          - [ ] Customize environment-specific values if needed
          - [ ] Verify ArgoCD ApplicationSet will detect new service
          - [ ] Merge to trigger deployment to dev/staging
          - [ ] For production: manually sync in ArgoCD UI
          
          ### Configuration
          - **Health Check:** \`${{ inputs.health-check-path }}\`
          - **Readiness Check:** \`${{ inputs.readiness-check-path }}\`
          - **Components Applied:** security-hardening, observability, common-labels
          
          ---
          *This PR was automatically generated by the scaffold workflow.*
          *Triggered by: @${{ github.actor }}*"
          
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base master \
            --head "${{ env.branch-name }}" \
            --label "automated,scaffold,new-service")
          
          echo "✅ Pull Request created: $PR_URL"
          echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Direct commit (no PR)
        if: inputs.create-pr == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add bases/${{ inputs.service-name }}
          git add environments/
          
          git commit -m "feat: add ${{ inputs.service-name }} scaffold
          
          - Service: ${{ inputs.service-name }}
          - Image: ${{ inputs.image-name }}
          - Generated by: ${{ github.actor }}"
          
          git push origin master
          
          echo "✅ Changes committed directly to master"

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ SCAFFOLD GENERATION COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Service: ${{ inputs.service-name }}"
          echo "Image: ${{ inputs.image-name }}"
          echo "Environments: ${{ inputs.environments }}"
          echo ""
          echo "Files Created:"
          echo "  ✅ bases/${{ inputs.service-name }}/"
          
          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            if [ "$ENV" == "prod" ]; then
              echo "  ✅ environments/prod/${{ inputs.service-name }}/ (dedicated namespace)"
            else
              echo "  ✅ environments/${ENV}/${{ inputs.service-name }}/ (shared namespace)"
            fi
          done
          
          echo ""
          if [ "${{ inputs.create-pr }}" == "true" ]; then
            echo "Pull Request: Created"
          else
            echo "Direct Commit: Pushed to master"
          fi
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"