name: Generate Service Scaffold

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Service name (e.g., go-payment-service)'
        required: true
        type: string
      image-name:
        description: 'Full image name (e.g., ghcr.io/davidsugianto/go-payment-service)'
        required: true
        type: string
      environments:
        description: 'Environments to generate'
        required: true
        type: choice
        options:
          - 'dev,staging,prod'
          - 'dev,staging'
          - 'dev'
          - 'prod'
        default: 'dev,staging,prod'
      create-pr:
        description: 'Create Pull Request (recommended)'
        required: true
        type: boolean
        default: true
      include-ingress:
        description: 'Include Ingress resource'
        required: true
        type: boolean
        default: true
      include-hpa:
        description: 'Include Horizontal Pod Autoscaler'
        required: true
        type: boolean
        default: true
      include-external-secret:
        description: 'Include ExternalSecret resource'
        required: true
        type: boolean
        default: true
      secret-store-type:
        description: 'Secret store type (aws/vault/gcp)'
        required: false
        type: choice
        options:
          - 'aws'
          - 'vault'
          - 'gcp'
        default: 'aws'
      secret-keys:
        description: 'Comma-separated secret keys (e.g., database-url,api-key,redis-password)'
        required: false
        type: string
        default: 'database-url,api-key'
      custom-port:
        description: 'Container port (default: 8080)'
        required: false
        type: string
        default: '8080'
      health-check-path:
        description: 'Health check path (default: /health)'
        required: false
        type: string
        default: '/health'
      readiness-check-path:
        description: 'Readiness check path (default: /ready)'
        required: false
        type: string
        default: '/ready'

  # Automated trigger from other workflows (optional)
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      environments:
        required: false
        type: string
        default: 'dev,staging,prod'
      create-pr:
        required: false
        type: boolean
        default: true
      include-ingress:
        required: false
        type: boolean
        default: true
      include-hpa:
        required: false
        type: boolean
        default: true
      include-external-secret:
        required: false
        type: boolean
        default: true
      secret-store-type:
        required: false
        type: string
        default: 'aws'
      secret-keys:
        required: false
        type: string
        default: 'database-url,api-key'
      custom-port:
        required: false
        type: string
        default: '8080'
      health-check-path:
        required: false
        type: string
        default: '/health'
      readiness-check-path:
        required: false
        type: string
        default: '/ready'
    secrets:
      git-token:
        required: false

jobs:
  generate-scaffold:
    name: Generate Service Scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Validate inputs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating inputs..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Validate service name (Kubernetes naming rules)
          if [[ ! "${{ inputs.service-name }}" =~ ^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$ ]]; then
            echo "❌ Invalid service name: ${{ inputs.service-name }}"
            echo "Service name must:"
            echo "  - Contain only lowercase alphanumeric characters or '-'"
            echo "  - Start and end with an alphanumeric character"
            echo "  - Be max 63 characters"
            exit 1
          fi

          SERVICE_NAME="${{ inputs.service-name }}"
          if [ ${#SERVICE_NAME} -gt 63 ]; then
            echo "❌ Service name too long (max 63 characters)"
            exit 1
          fi

          # Validate secret store type
          if [ "${{ inputs.include-external-secret }}" == "true" ]; then
            STORE_TYPE="${{ inputs.secret-store-type }}"
            if [[ "$STORE_TYPE" != "aws" && "$STORE_TYPE" != "vault" && "$STORE_TYPE" != "gcp" ]]; then
              echo "❌ Invalid secret store type: $STORE_TYPE"
              echo "Supported types: aws, vault, gcp"
              exit 1
            fi
          fi

          # Check if service already exists
          if [ -d "bases/${{ inputs.service-name }}" ]; then
            echo "⚠️  Warning: Service '${{ inputs.service-name }}' already exists in bases/"
            echo "This will overwrite existing files!"
          fi

          echo "✅ All inputs validated"
          echo ""
          echo "📋 Configuration:"
          echo "  Service Name: ${{ inputs.service-name }}"
          echo "  Image Name: ${{ inputs.image-name }}"
          echo "  Environments: ${{ inputs.environments }}"
          echo "  Create PR: ${{ inputs.create-pr }}"
          echo "  Include Ingress: ${{ inputs.include-ingress }}"
          echo "  Include HPA: ${{ inputs.include-hpa }}"
          echo "  Include ExternalSecret: ${{ inputs.include-external-secret }}"
          if [ "${{ inputs.include-external-secret }}" == "true" ]; then
            echo "  Secret Store Type: ${{ inputs.secret-store-type }}"
            echo "  Secret Keys: ${{ inputs.secret-keys }}"
          fi
          echo "  Container Port: ${{ inputs.custom-port }}"
          echo "  Health Check: ${{ inputs.health-check-path }}"
          echo "  Readiness Check: ${{ inputs.readiness-check-path }}"
          echo ""

      - name: Generate scaffold files
        id: generate
        run: |
          ./scripts/generate-service-scaffold.sh \
            --service-name "${{ inputs.service-name }}" \
            --image-name "${{ inputs.image-name }}" \
            --environments "${{ inputs.environments }}" \
            --include-ingress "${{ inputs.include-ingress }}" \
            --include-hpa "${{ inputs.include-hpa }}" \
            --include-external-secret "${{ inputs.include-external-secret }}" \
            --secret-store-type "${{ inputs.secret-store-type }}" \
            --secret-keys "${{ inputs.secret-keys }}" \
            --port "${{ inputs.custom-port }}" \
            --health-check-path "${{ inputs.health-check-path }}" \
            --readiness-check-path "${{ inputs.readiness-check-path }}"

      - name: Validate generated manifests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating generated manifests..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Validate each environment
          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"

          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            KUSTOMIZE_DIR="environments/${ENV}/${{ inputs.service-name }}"

            echo ""
            echo "📦 Validating: $KUSTOMIZE_DIR"

            if ! kustomize build "$KUSTOMIZE_DIR" > /dev/null 2>&1; then
              echo "❌ Kustomize build failed for $KUSTOMIZE_DIR"
              kustomize build "$KUSTOMIZE_DIR" 2>&1 | sed 's/^/  /'
              exit 1
            fi

            echo "✅ Kustomize build successful"
          done

          echo ""
          echo "✅ All validations passed!"

      - name: Configure Git
        if: inputs.create-pr == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        if: inputs.create-pr == true
        run: |
          BRANCH_NAME="scaffold/${{ inputs.service-name }}"

          git checkout -b "$BRANCH_NAME"

          git add "bases/${{ inputs.service-name }}"

          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            git add "environments/${ENV}/${{ inputs.service-name }}"
            git add "environments/${ENV}/kustomization.yaml"
          done

          git commit -m "feat: add ${{ inputs.service-name }} scaffold

          - Service: ${{ inputs.service-name }}
          - Image: ${{ inputs.image-name }}
          - Environments: ${{ inputs.environments }}
          - External Secret: ${{ inputs.include-external-secret }} (${{ inputs.secret-store-type }})
          - Generated by: ${{ github.actor }}
          - Workflow: ${{ github.workflow }}"

          git push origin "$BRANCH_NAME"

          echo "branch-name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        if: inputs.create-pr == true
        run: |
          PR_TITLE="🆕 Add ${{ inputs.service-name }} scaffold"

          # Build external secret section for PR body
          if [ "${{ inputs.include-external-secret }}" == "true" ]; then
            EXTERNAL_SECRET_SECTION="
          #### External Secret Configuration
          - **Store Type:** \`${{ inputs.secret-store-type }}\`
          - **Store Name:** \`$(case "${{ inputs.secret-store-type }}" in aws) echo "aws-secret-store";; vault) echo "vault-secret-store";; gcp) echo "gcp-secret-store";; esac)\`
          - **Secret Keys:**
          $(IFS=',' read -ra KEYS_ARRAY <<< "${{ inputs.secret-keys }}"
          for KEY in "${KEYS_ARRAY[@]}"; do
            KEY=$(echo "$KEY" | xargs)
            echo "    - \`${KEY}\`"
          done)

          **⚠️ Important:** Ensure the following secrets exist in your secret manager:
          $(IFS=',' read -ra KEYS_ARRAY <<< "${{ inputs.secret-keys }}"
          for KEY in "${KEYS_ARRAY[@]}"; do
            KEY=$(echo "$KEY" | xargs)
            case "${{ inputs.secret-store-type }}" in
              aws)
                echo "- AWS Secrets Manager: \`/dev/${{ inputs.service-name }}\` → property: \`${KEY}\`"
                ;;
              vault)
                echo "- Vault: \`secret/data/dev/${{ inputs.service-name }}\` → field: \`${KEY}\`"
                ;;
              gcp)
                echo "- GCP Secret Manager: \`projects/my-project/secrets/${KEY}\`"
                ;;
            esac
          done)"
          else
            EXTERNAL_SECRET_SECTION="
          #### External Secret Configuration
          - ⏭️ Skipped - no external secret will be created"
          fi

          PR_BODY="## New Service Scaffold

          ### Service Details
          - **Name:** \`${{ inputs.service-name }}\`
          - **Image:** \`${{ inputs.image-name }}\`
          - **Environments:** ${{ inputs.environments }}
          - **Container Port:** ${{ inputs.custom-port }}

          ### Generated Files

          #### Base Manifests
          - \`bases/${{ inputs.service-name }}/deployment.yaml\`
          - \`bases/${{ inputs.service-name }}/service.yaml\`
          $(if [ "${{ inputs.include-ingress }}" == "true" ]; then echo "- \`bases/${{ inputs.service-name }}/ingress.yaml\`"; fi)
          $(if [ "${{ inputs.include-hpa }}" == "true" ]; then echo "- \`bases/${{ inputs.service-name }}/hpa.yaml\`"; fi)
          $(if [ "${{ inputs.include-external-secret }}" == "true" ]; then echo "- \`bases/${{ inputs.service-name }}/external-secret.yaml\`"; fi)
          - \`bases/${{ inputs.service-name }}/kustomization.yaml\`

          ${EXTERNAL_SECRET_SECTION}

          #### Environment Overlays
          $(IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            if [ "$ENV" == "prod" ]; then
              echo "- \`environments/prod/${{ inputs.service-name }}/\` (dedicated namespace: prod-${{ inputs.service-name }})"
            else
              echo "- \`environments/${ENV}/${{ inputs.service-name }}/\` (shared namespace: ${ENV})"
            fi
          done)

          ### Next Steps
          - [ ] Review generated manifests
          - [ ] Customize environment-specific values if needed
          $(if [ "${{ inputs.include-external-secret }}" == "true" ]; then echo "- [ ] Ensure secrets exist in your secret manager (${{ inputs.secret-store-type }})"; fi)
          - [ ] Verify ArgoCD ApplicationSet will detect new service
          - [ ] Merge to trigger deployment to dev/staging
          - [ ] For production: manually sync in ArgoCD UI

          ### Configuration
          - **Health Check:** \`${{ inputs.health-check-path }}\`
          - **Readiness Check:** \`${{ inputs.readiness-check-path }}\`
          - **Components Applied:** security-hardening, observability, common-labels

          ---
          *This PR was automatically generated by the scaffold workflow.*
          *Triggered by: @${{ github.actor }}*"

          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base master \
            --head "${{ env.branch-name }}" \
            --label "automated,scaffold,new-service")

          echo "✅ Pull Request created: $PR_URL"
          echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Direct commit (no PR)
        if: inputs.create-pr == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "bases/${{ inputs.service-name }}"

          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            git add "environments/${ENV}/${{ inputs.service-name }}"
            git add "environments/${ENV}/kustomization.yaml"
          done

          git commit -m "feat: add ${{ inputs.service-name }} scaffold

          - Service: ${{ inputs.service-name }}
          - Image: ${{ inputs.image-name }}
          - External Secret: ${{ inputs.include-external-secret }} (${{ inputs.secret-store-type }})
          - Generated by: ${{ github.actor }}"

          git push origin master

          echo "✅ Changes committed directly to master"

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ SCAFFOLD GENERATION COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Service: ${{ inputs.service-name }}"
          echo "Image: ${{ inputs.image-name }}"
          echo "Environments: ${{ inputs.environments }}"
          echo ""
          echo "Files Created:"
          echo "  ✅ bases/${{ inputs.service-name }}/"

          IFS=',' read -ra ENV_ARRAY <<< "${{ inputs.environments }}"
          for ENV in "${ENV_ARRAY[@]}"; do
            ENV=$(echo "$ENV" | xargs)
            if [ "$ENV" == "prod" ]; then
              echo "  ✅ environments/prod/${{ inputs.service-name }}/ (dedicated namespace)"
            else
              echo "  ✅ environments/${ENV}/${{ inputs.service-name }}/ (shared namespace)"
            fi
          done

          echo ""
          if [ "${{ inputs.include-external-secret }}" == "true" ]; then
            echo "External Secret Configuration:"
            echo "  Store Type: ${{ inputs.secret-store-type }}"
            echo "  Secret Keys:"
            IFS=',' read -ra KEYS_ARRAY <<< "${{ inputs.secret-keys }}"
            for KEY in "${KEYS_ARRAY[@]}"; do
              KEY=$(echo "$KEY" | xargs)
              echo "    - ${KEY}"
            done
            echo ""
            echo "⚠️  Important: Ensure secrets exist in your secret manager:"
            IFS=',' read -ra KEYS_ARRAY <<< "${{ inputs.secret-keys }}"
            for KEY in "${KEYS_ARRAY[@]}"; do
              KEY=$(echo "$KEY" | xargs)
              case "${{ inputs.secret-store-type }}" in
                aws)
                  echo "    AWS Secrets Manager: /dev/${{ inputs.service-name }} → property: ${KEY}"
                  ;;
                vault)
                  echo "    Vault: secret/data/dev/${{ inputs.service-name }} → field: ${KEY}"
                  ;;
                gcp)
                  echo "    GCP Secret Manager: projects/my-project/secrets/${KEY}"
                  ;;
              esac
            done
          else
            echo "External Secret: ⏭️ Skipped"
          fi

          echo ""
          if [ "${{ inputs.create-pr }}" == "true" ]; then
            echo "Pull Request: Created"
          else
            echo "Direct Commit: Pushed to master"
          fi
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"